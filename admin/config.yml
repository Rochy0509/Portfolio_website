backend:
  name: git-gateway
  branch: main

# Publish mode - use editorial workflow for drafts
publish_mode: editorial_workflow

# Media files
media_folder: "blog/images"
public_folder: "images"

# Site URL for previews
site_url: https://kenneth-martinez.com
display_url: https://kenneth-martinez.com

# Logo for the CMS
logo_url: https://kenneth-martinez.com/assets/img/favicon.png

# Collections (content types)
collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "blog/_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime", format: "MMM D, YYYY"}
      - {label: "Category", name: "category", widget: "select", options: ["Robotics", "Machine Learning", "Career", "Tutorial", "Project", "News"]}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
