<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <title>Kenneth Martinez Blog - Robotics & Engineering</title>
  <meta name="description"
    content="Explore Kenneth Martinez's blog featuring insights on robotics, mechatronics engineering, automation, ROS, and cutting-edge technology developments.">

  <!-- Favicons -->
  <link href="../assets/img/favicon.png" rel="icon">
  <link href="../assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Vendor CSS Files -->
  <link href="../assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="../assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="../assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="../assets/css/style.css" rel="stylesheet">

  <!-- Blog Specific Overrides -->
  <style>
    /* Ensure the blog uses the soft tech theme */
    .blog-header {
      text-align: center;
      padding: 80px 0 40px;
    }

    .blog-header h1 {
      font-weight: 800;
      color: var(--soft-text);
      margin-bottom: 20px;
    }

    .blog-header p {
      color: var(--soft-muted);
      max-width: 600px;
      margin: 0 auto;
      font-size: 1.1rem;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px;
      padding-bottom: 60px;
    }

    .blog-card {
      /* Inherit soft-card properties but ensure full height */
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .blog-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 20px 20px 0 0;
    }

    .blog-meta {
      font-size: 0.85rem;
      color: var(--soft-muted);
      margin-bottom: 15px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .blog-category {
      background: rgba(5, 99, 187, 0.1);
      color: var(--soft-accent);
      padding: 4px 12px;
      border-radius: 50px;
      font-weight: 600;
    }

    /* Translate Element Positioning in Nav */
    .goog-te-gadget-simple {
      background-color: transparent !important;
      border: none !important;
      font-size: 0.9rem !important;
    }
  </style>
</head>

<body>

  <!-- New Soft Nav -->
  <nav id="soft-nav">
    <a href="../index.html" class="nav-logo">KM.</a>
    <ul class="soft-menu d-none d-md-flex align-items-center">
      <li><a href="../index.html">Back to Portfolio</a></li>
      <!-- Google Translate Placeholder -->
      <li id="google_translate_element"></li>
    </ul>
    <!-- Simple Mobile Menu Icon -->
    <i class="bi bi-list d-md-none" style="font-size: 1.5rem;"></i>
  </nav>

  <main id="main">
    <div class="container">

      <div class="blog-header" data-aos="fade-down">
        <h1>Engineering & Robotics Journal</h1>
        <p>Documenting my journey through ROS2, autonomous systems, and mechatronics design.</p>
      </div>

      <div class="blog-grid" id="blog-posts" data-aos="fade-up">
        <!-- Blog posts will be loaded here -->
        <div class="text-center w-100 p-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer style="text-align: center; padding: 40px; color: var(--soft-muted); font-size: 0.9rem;">
    <p>&copy; 2026 Kenneth Martinez.</p>
  </footer>

  <!-- Vendor JS Files -->
  <script src="../assets/vendor/aos/aos.js"></script>
  <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="../assets/vendor/swiper/swiper-bundle.min.js"></script>

  <!-- Google Translate Script -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'es,en', // Spanish and English
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script>
    AOS.init();
  </script>

  <!-- Blog Data -->
  <script src="posts.js"></script>

  <!-- Blog JavaScript -->
  <script>
    // Blog posts are loaded from posts.js into window.blogPosts

    // Function to load and display blog posts
    function loadBlogPosts() {
      const blogGrid = document.getElementById('blog-posts');
      const posts = window.blogPosts || [];

      if (posts.length === 0) {
        blogGrid.innerHTML = '<div class="no-posts"><h3>Coming Soon</h3></div>';
        return;
      }

      blogGrid.innerHTML = '';

      posts.forEach(post => {
        const article = document.createElement('article');
        article.className = 'soft-card blog-card';
        article.style.padding = '0'; // Override default padding for full image

        article.innerHTML = `
    <img src="${post.image}" alt="${post.title}" loading="lazy" onerror="this.src='../assets/img/hero-bg.jpg'"> <!-- Fallback image -->
      <div style="padding: 25px; display: flex; flex-direction: column; flex-grow: 1;">
        <div class="blog-meta">
          <span class="blog-category">${post.category}</span>
          <span><i class="bi bi-calendar3"></i> ${formatDate(post.date)}</span>
        </div>
        <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 10px;">
          <a href="${post.url}" style="color: var(--soft-text); text-decoration: none;">${post.title}</a>
        </h3>
        <p style="color: var(--soft-muted); font-size: 0.95rem; margin-bottom: 20px; flex-grow: 1;">
          ${post.excerpt}
        </p>
        <a href="${post.url}" style="color: var(--soft-accent); font-weight: 600; text-decoration: none;">
          Read Article &rarr;
        </a>
      </div>
        `;
        blogGrid.appendChild(article);
      });
    }

    // Format date for display
    function formatDate(dateString) {
      // Simple date parse or pass through
      return dateString;
    }

    // Initialize AOS
    AOS.init();

    // Load blog posts when page loads
    document.addEventListener('DOMContentLoaded', loadBlogPosts);
  </script>

  <!-- Netlify Identity Widget for CMS login -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

</body>

</html>
